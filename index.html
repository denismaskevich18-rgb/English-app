<!DOCTYPE html>
<html>
<head>
  <title>English App</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin-top: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #58cc02;
      color: white;
      font-size: 16px;
    }

    button:active {
      background: #46a302;
    }

    #answers button {
      background: #eee;
      color: black;
    }

    #answers button:active {
      background: #ccc;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>
<div class="app">

  <h1>Учить английский</h1>

  <div class="card">
    <button onclick="startLesson()">Учить слова</button>
    <button onclick="startTest()">Тест</button>
  </div>
  <button onclick="alert('Работает')">Новая кнопка</button>

  <div id="lesson" class="card" style="display:none;">
    <h2 id="word"></h2>
    <button onclick="nextWord()">Дальше</button>
  </div>

  <div id="test" class="card" style="display:none;">
    <h2 id="question"></h2>
    <div id="answers"></div>
    <p id="status" class="status"></p>
  </div>

</div>

<script>
let words = [
  {en: "apple", ru: "яблоко"},
  {en: "go", ru: "идти"},
  {en: "cat", ru: "кот"},
  {en: "dog", ru: "собака"}
];

let index = 0;
let score = 0;
let lives = 3;
let correct = 0;

// УРОК
function startLesson() {
  document.getElementById("lesson").style.display = "block";
  document.getElementById("test").style.display = "none";
  showWord();
}

function showWord() {
  document.getElementById("word").innerText =
    words[index].en + " - " + words[index].ru;
}

function nextWord() {
  index = (index + 1) % words.length;
  showWord();
}

// ТЕСТ
function startTest() {
  document.getElementById("lesson").style.display = "none";
  document.getElementById("test").style.display = "block";
  index = 0;
  score = 0;
  lives = 3;
  showQuestion();
}

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function showQuestion() {
  if (lives <= 0) {
    alert("Игра окончена 😢");
    return;
  }

  let w = words[index];
  document.getElementById("question").innerText = w.en + " = ?";

  let options = [w.ru];

  while (options.length < 4) {
    let random = words[Math.floor(Math.random() * words.length)].ru;
    if (!options.includes(random)) options.push(random);
  }

  options = shuffle(options);
  correct = options.indexOf(w.ru);

  let html = "";
  options.forEach((opt, i) => {
    html += `<button onclick="checkAnswer(${i})">${opt}</button>`;
  });

  document.getElementById("answers").innerHTML = html;
  document.getElementById("status").innerText =
    "Очки: " + score + " | ❤️ " + lives;
}

function checkAnswer(i) {
  if (i === correct) {
    score++;
  } else {
    lives--;
  }

  index++;
  if (index >= words.length) {
    alert("Тест закончен! Очки: " + score);
    index = 0;
  }

  showQuestion();
}
</script>

</body>
</html>
