<!DOCTYPE html>
<html>
<head>
  <title>English App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f0f0f0;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: #58cc02;
      color: white;
    }
    .card {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 15px;
    }
  </style>
</head>
<body>

<h1>Учить английский</h1>

<div class="card">
  <button onclick="startLesson()">Учить слова</button>
  <button onclick="startTest()">Тест</button>
</div>

<div id="lesson" class="card" style="display:none;">
  <h2 id="word"></h2>
  <button onclick="nextWord()">Дальше</button>
</div>

<div id="test" class="card" style="display:none;">
  <h2 id="question"></h2>
  <div id="answers"></div>
  <p id="status"></p>
</div>

<script>
let words = [
  {en: "apple", ru: "яблоко"},
  {en: "go", ru: "идти"},
  {en: "cat", ru: "кот"},
  {en: "dog", ru: "собака"}
];

let index = 0;
let score = 0;
let lives = 3;
let correct = 0;

// УРОК
function startLesson() {
  document.getElementById("lesson").style.display = "block";
  document.getElementById("test").style.display = "none";
  showWord();
}

function showWord() {
  document.getElementById("word").innerText =
    words[index].en + " - " + words[index].ru;
}

function nextWord() {
  index = (index + 1) % words.length;
  showWord();
}

// ТЕСТ
function startTest() {
  document.getElementById("lesson").style.display = "none";
  document.getElementById("test").style.display = "block";
  index = 0;
  score = 0;
  lives = 3;
  showQuestion();
}

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function showQuestion() {
  if (lives <= 0) {
    alert("Игра окончена 😢");
    return;
  }

  let w = words[index];
  document.getElementById("question").innerText = w.en + " = ?";

  let options = [w.ru];

  while (options.length < 4) {
    let random = words[Math.floor(Math.random() * words.length)].ru;
    if (!options.includes(random)) options.push(random);
  }

  options = shuffle(options);
  correct = options.indexOf(w.ru);

  let html = "";
  options.forEach((opt, i) => {
    html += `<button onclick="checkAnswer(${i})">${opt}</button><br>`;
  });

  document.getElementById("answers").innerHTML = html;
  document.getElementById("status").innerText =
    "Очки: " + score + " | ❤️ " + lives;
}

function checkAnswer(i) {
  if (i === correct) {
    score++;
  } else {
    lives--;
  }

  index++;
  if (index >= words.length) {
    alert("Ты прошёл тест! Очки: " + score);
    index = 0;
  }

  showQuestion();
}
</script>

</body>
</html>
